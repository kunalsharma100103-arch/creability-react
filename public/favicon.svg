<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="fn" cx="38%" cy="33%" r="65%">
      <stop offset="0%"   stop-color="#fff4cc"/>
      <stop offset="35%"  stop-color="#f5a800"/>
      <stop offset="80%"  stop-color="#c07800"/>
      <stop offset="100%" stop-color="#7a4500"/>
    </radialGradient>
    <radialGradient id="fg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5a800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5a800" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="fc">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Dark navy background -->
  <circle cx="32" cy="32" r="32" fill="#0c1d35"/>

  <!-- Three orbital rings clipped to circle, drawn back-to-front -->
  <g clip-path="url(#fc)">
    <!-- Gold/amber orbit at 120° -->
    <ellipse cx="32" cy="32" rx="27" ry="8" fill="none"
             stroke="#c87a14" stroke-width="4.5"
             transform="rotate(120 32 32)"/>
    <!-- Teal/green orbit at 60° -->
    <ellipse cx="32" cy="32" rx="27" ry="8" fill="none"
             stroke="#38a88a" stroke-width="4.5"
             transform="rotate(60 32 32)"/>
    <!-- Blue orbit at 0° — horizontal, electron sits on its right end -->
    <ellipse cx="32" cy="32" rx="27" ry="8" fill="none"
             stroke="#3878c0" stroke-width="4.5"/>
  </g>

  <!-- Nucleus amber glow -->
  <circle cx="32" cy="32" r="18" fill="url(#fg)"/>
  <!-- Nucleus sphere with radial gradient -->
  <circle cx="32" cy="32" r="11" fill="url(#fn)"/>
  <!-- Specular highlight -->
  <circle cx="29" cy="29" r="3.5" fill="#fffce0" opacity="0.65"/>

  <!-- Green electron on right end of horizontal blue orbit -->
  <circle cx="58" cy="33" r="3.5" fill="#3dbf90"/>
  <circle cx="57" cy="32" r="1.4" fill="#b8fff0" opacity="0.72"/>
</svg>
