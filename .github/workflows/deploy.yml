name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate config.php from secrets
        run: |
          sed \
            -e "s|%%DB_NAME%%|${{ secrets.DB_NAME }}|g" \
            -e "s|%%DB_USER%%|${{ secrets.DB_USER }}|g" \
            -e "s|%%DB_PASS%%|${{ secrets.DB_PASS }}|g" \
            -e "s|%%JWT_SECRET%%|${{ secrets.JWT_SECRET }}|g" \
            public/api/config.template.php > dist/api/config.php

      - name: Push built files to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: hostinger-deploy
          force_orphan: true
