name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate config.php from secrets
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          python3 -c "
          import os
          c = open('public/api/config.template.php').read()
          c = c.replace('%%DB_NAME%%', os.environ['DB_NAME'])
          c = c.replace('%%DB_USER%%', os.environ['DB_USER'])
          c = c.replace('%%DB_PASS%%', os.environ['DB_PASS'])
          c = c.replace('%%JWT_SECRET%%', os.environ['JWT_SECRET'])
          open('dist/api/config.php', 'w').write(c)
          "

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          security: loose
          timeout: 120000
          exclude: |
            **/uploads/**
